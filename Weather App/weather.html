<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Dashboard</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#4096ec;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    margin-top:20px;
}

.container{
    display:flex;
    gap:20px;
    margin-top:30px;
}

.card{
    background:white;
    padding:20px;
    width:200px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}

.temp{
    font-size:28px;
    font-weight:bold;
}

.emoji{
    font-size:40px;
}

.spinner{
    margin-top:50px;
    border:6px solid #eee;
    border-top:6px solid #3498db;
    border-radius:50%;
    width:40px;
    height:40px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{ transform:rotate(360deg); }
}

.error{
    color:red;
    margin-top:20px;
}
</style>

</head>
<body>

<h1>Weather Dashboard</h1>

<div id="loader" class="spinner"></div>
<div id="error" class="error"></div>

<div class="container" id="weatherContainer"></div>

<script>

const cities = [
    {name:"Delhi", lat:28.61, lon:77.23},
    {name:"Mumbai", lat:19.07, lon:72.87},
    {name:"Bangalore", lat:12.97, lon:77.59}
]

function weatherEmoji(code){

    if(code === 0) return "☀️ Clear"
    if(code <= 3) return "⛅ Cloudy"
    if(code <= 48) return "🌫 Fog"
    if(code <= 67) return "🌧 Rain"
    if(code <= 77) return "❄️ Snow"
    if(code <= 99) return "⛈ Storm"

    return "🌍"
}

async function fetchWeather(){

    const loader = document.getElementById("loader")
    const container = document.getElementById("weatherContainer")
    const errorDiv = document.getElementById("error")

    try{

        const requests = cities.map(city =>
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true`)
                .then(res => res.json())
        )

        const results = await Promise.all(requests)

        loader.style.display = "none"

        results.forEach((data,index)=>{

            const weather = data.current_weather

            const card = document.createElement("div")
            card.className = "card"

            card.innerHTML = `
                <h3>${cities[index].name}</h3>
                <div class="emoji">${weatherEmoji(weather.weathercode)}</div>
                <div class="temp">${weather.temperature}°C</div>
            `

            container.appendChild(card)

        })

    }
    catch(err){

        loader.style.display="none"
        errorDiv.textContent="⚠ Failed to load weather data"

    }

}

fetchWeather()

</script>

</body>
</html>
