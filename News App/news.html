<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech News</title>

<style>
body{
    font-family: Arial;
}

.news{
    margin-bottom:20px;
}
</style>

</head>

<body>

<h1>TECH NEWS</h1>

<nav style="border-bottom:1px solid black;padding:10px;">
<button onclick="getNews('ai')">AI</button>
<button onclick="getNews('javascript')">JavaScript</button>
<button onclick="getNews('startup')">Startup</button>
<button onclick="getNews('programming')">Programming</button>
</nav>

<br>

<div id="news-container"></div>

<script>

async function getNews(topic){

    const url = `https://hn.algolia.com/api/v1/search?query=${topic}`;

    const response = await fetch(url);
    const data = await response.json();

    const container = document.getElementById("news-container");

    container.innerHTML = "";

    data.hits.forEach(item => {

        const div = document.createElement("div");
        div.className = "news";

        div.innerHTML = `
        <h3>${item.title || "No Title"}</h3>
        <a href="${item.url}" target="_blank">Read</a>
        <hr>
        `;

        container.appendChild(div);

    });

}

window.onload = () => getNews("startup");

</script>

</body>
</html>
